<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISHABH HOLOGRAM ENGINE</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#video-input{
position:absolute;
bottom:20px;
right:20px;
width:220px;
border-radius:10px;
transform:scaleX(-1);
opacity:0.6;
border:2px solid cyan;
}

#credit{
position:absolute;
top:12px;
left:12px;
font-size:18px;
font-weight:600;
letter-spacing:1px;
color:white;
z-index:5;

text-shadow:
0 0 5px rgba(255,255,255,.6),
0 0 10px rgba(0,255,255,.6);

animation:hudPulse 3s infinite alternate;
}

.rk{
color:#00ffff;
font-weight:bold;
text-shadow:
0 0 5px #00ffff,
0 0 10px #00ffff,
0 0 20px #00ffff;
}

.tech{
color:#ff6600;
font-weight:bold;
text-shadow:
0 0 5px #ff6600,
0 0 10px #ff6600,
0 0 20px #ff6600;
}

@keyframes hudPulse{
0%{opacity:.7;transform:translateY(0px);}
100%{opacity:1;transform:translateY(1px);}
}

#startBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:16px 30px;
font-size:20px;
background:black;
color:cyan;
border:2px solid cyan;
cursor:pointer;
z-index:1000;
}

#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:cyan;
font-size:24px;
display:none;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

</head>
<body>

<div id="credit">
Created By <span class="rk">RK</span> <span class="tech">Techmania</span>
</div>

<button id="startBtn">START EXPERIENCE</button>
<div id="loading">Initializing Universe...</div>
<video id="video-input" autoplay playsinline></video>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

////////////////////////////////////////////////////
// SCENE
////////////////////////////////////////////////////

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z=70;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

////////////////////////////////////////////////////
// STARFIELD
////////////////////////////////////////////////////

const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(4000*3);

for(let i=0;i<4000*3;i++){
starPos[i]=(Math.random()-0.5)*1200;
}

starGeo.setAttribute("position",new THREE.BufferAttribute(starPos,3));

const starMat=new THREE.PointsMaterial({size:1,color:0xffffff});
const stars=new THREE.Points(starGeo,starMat);
scene.add(stars);

////////////////////////////////////////////////////
// PARTICLES
////////////////////////////////////////////////////

const count=6000;

const geo=new THREE.BufferGeometry();
const pos=new Float32Array(count*3);
const target=new Float32Array(count*3);

for(let i=0;i<count*3;i++){
pos[i]=(Math.random()-0.5)*120;
target[i]=pos[i];
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));

const mat=new THREE.PointsMaterial({
size:0.6,
color:0xff5500,
transparent:true,
blending:THREE.AdditiveBlending,
depthWrite:false
});

const particles=new THREE.Points(geo,mat);
scene.add(particles);

////////////////////////////////////////////////////
// LIGHTNING
////////////////////////////////////////////////////

const lightningMat=new THREE.LineBasicMaterial({color:0x00ffff});
const lightningGeo=new THREE.BufferGeometry();
const lightning=new THREE.Line(lightningGeo,lightningMat);
scene.add(lightning);

////////////////////////////////////////////////////
// INTRO VARIABLES
////////////////////////////////////////////////////

let introStarted=false;
let introTime=0;
let introPhase=0;
let gestureEnabled=false;

////////////////////////////////////////////////////
// INTRO WARP TUNNEL
////////////////////////////////////////////////////

function warpTunnel(){

const p=geo.attributes.position;

for(let i=0;i<count;i++){

const i3=i*3;

const angle=introTime*3+i*0.05;
const radius=40;

p.array[i3]=Math.cos(angle)*radius;
p.array[i3+1]=Math.sin(angle)*radius;
p.array[i3+2]=(i%200)-100;

}

p.needsUpdate=true;

}

////////////////////////////////////////////////////
// STAR EXPLOSION
////////////////////////////////////////////////////

function starExplosion(){

for(let i=0;i<count;i++){

const i3=i*3;

target[i3]=(Math.random()-0.5)*160;
target[i3+1]=(Math.random()-0.5)*160;
target[i3+2]=(Math.random()-0.5)*160;

}

}

////////////////////////////////////////////////////
// TEXT SHAPE
////////////////////////////////////////////////////

function shapeText(text){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=1000;
canvas.height=300;

ctx.fillStyle="white";
ctx.font="bold 200px Arial";
ctx.textAlign="center";
ctx.fillText(text,canvas.width/2,200);

const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;

let points=[];

for(let y=0;y<canvas.height;y+=6){
for(let x=0;x<canvas.width;x+=6){

const index=(y*canvas.width+x)*4;

if(data[index]>128){
points.push({
x:(x-canvas.width/2)/10,
y:(canvas.height/2-y)/10
});
}

}
}

for(let i=0;i<count;i++){

const i3=i*3;
const p=points[i%points.length];

target[i3]=p.x;
target[i3+1]=p.y;
target[i3+2]=0;

}

}

////////////////////////////////////////////////////
// EXTRA SHAPES
////////////////////////////////////////////////////

function shapeSphere(){

for(let i=0;i<count;i++){

const i3=i*3;

const r=25*Math.cbrt(Math.random());
const theta=Math.random()*Math.PI*2;
const phi=Math.acos(2*Math.random()-1);

target[i3]=r*Math.sin(phi)*Math.cos(theta);
target[i3+1]=r*Math.sin(phi)*Math.sin(theta);
target[i3+2]=r*Math.cos(phi);

}

}

function shapeTorus(){

for(let i=0;i<count;i++){

const i3=i*3;

const angle=Math.random()*Math.PI*2;

target[i3]=(25+6*Math.cos(angle))*Math.cos(angle);
target[i3+1]=(25+6*Math.cos(angle))*Math.sin(angle);
target[i3+2]=6*Math.sin(angle);

}

}

function shapeDNA(){

for(let i=0;i<count;i++){

const i3=i*3;

const t=i*0.05;

target[i3]=Math.sin(t)*15;
target[i3+1]=Math.cos(t)*15;
target[i3+2]=(i%200)-100;

}

}

function shapeGalaxy(){

for(let i=0;i<count;i++){

const i3=i*3;

const r=Math.random()*40;
const a=r*0.3;

target[i3]=Math.cos(a)*r;
target[i3+1]=Math.sin(a)*r;
target[i3+2]=(Math.random()-0.5)*10;

}

}

function shapeCube(){

for(let i=0;i<count;i++){

const i3=i*3;

target[i3]=(Math.random()-0.5)*40;
target[i3+1]=(Math.random()-0.5)*40;
target[i3+2]=(Math.random()-0.5)*40;

}

}

////////////////////////////////////////////////////
// SHAPE LIST
////////////////////////////////////////////////////

const shapes=[
()=>shapeText("RISHABH"),
shapeSphere,
shapeTorus,
shapeDNA,
shapeGalaxy,
shapeCube
];

function randomShape(){
shapes[Math.floor(Math.random()*shapes.length)]();
}

////////////////////////////////////////////////////
// AUDIO
////////////////////////////////////////////////////

let analyserNode,dataArray;

document.getElementById("startBtn").onclick=async()=>{

document.getElementById("startBtn").style.display="none";
document.getElementById("loading").style.display="block";

const ctx=new AudioContext();

const stream=await navigator.mediaDevices.getUserMedia({audio:true});

const source=ctx.createMediaStreamSource(stream);

analyserNode=ctx.createAnalyser();
analyserNode.fftSize=128;

source.connect(analyserNode);

dataArray=new Uint8Array(analyserNode.frequencyBinCount);

introStarted=true;

};

////////////////////////////////////////////////////
// HAND TRACKING
////////////////////////////////////////////////////

const video=document.getElementById("video-input");

let scale=1;
let moveX=0;
let moveY=0;
let lastTrigger=0;
let rotationY=0;

function onResults(results){

if(!gestureEnabled)return;

document.getElementById("loading").style.display="none";

if(results.multiHandLandmarks?.length){

const lm=results.multiHandLandmarks[0];

moveX=THREE.MathUtils.lerp(moveX,(lm[9].x-0.5)*50,0.2);
moveY=THREE.MathUtils.lerp(moveY,(0.5-lm[9].y)*30,0.2);

const pinch=Math.hypot(lm[4].x-lm[8].x,lm[4].y-lm[8].y);
scale=THREE.MathUtils.clamp(pinch*12,0.5,3);

rotationY=(lm[0].x-0.5)*3;

const victory=
lm[8].y<lm[6].y &&
lm[12].y<lm[10].y;

if(victory && Date.now()-lastTrigger>4000){

randomShape();
lastTrigger=Date.now();

}

}

}

const hands=new Hands({
locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(onResults);

const cam=new Camera(video,{
onFrame:async()=>await hands.send({image:video}),
width:640,
height:480
});

cam.start();

////////////////////////////////////////////////////
// ANIMATION LOOP
////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

if(!introStarted){
renderer.render(scene,camera);
return;
}

introTime+=0.02;

if(!gestureEnabled){

if(introTime<2){
warpTunnel();
}

if(introTime>2 && introPhase===0){
starExplosion();
introPhase=1;
}

if(introTime>3 && introPhase===1){
shapeText("RISHABH");
introPhase=2;
}

if(introTime>6){
gestureEnabled=true;
}

}

let freq=0;

if(analyserNode){

analyserNode.getByteFrequencyData(dataArray);
freq=dataArray.reduce((a,b)=>a+b)/dataArray.length;

}

const hue=(Date.now()*0.0004+freq*0.01)%1;

mat.color.setHSL(hue,1,0.6);
mat.size=0.4+freq/120;

particles.rotation.y+=0.01+rotationY*0.02;

const p=geo.attributes.position;

for(let i=0;i<count;i++){

const i3=i*3;

p.array[i3]+=((target[i3]*scale + moveX)-p.array[i3])*0.05;
p.array[i3+1]+=((target[i3+1]*scale + moveY)-p.array[i3+1])*0.05;
p.array[i3+2]+=((target[i3+2]*scale)-p.array[i3+2])*0.05;

}

p.needsUpdate=true;

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);

});

</script>
</body>
</html>
